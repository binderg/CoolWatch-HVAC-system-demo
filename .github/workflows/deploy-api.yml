name: Deploy API to Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      - 'hvac-api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build, push, and deploy API

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./hvac-api
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/hvac-api:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/hvac-api:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy new revision to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: ca-hvac-api-dev
          resourceGroup: rg-hvac-dev
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/hvac-api:${{ github.sha }}
          registryUrl: ${{ secrets.ACR_LOGIN_SERVER }}
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
