name: Deploy API to Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      - 'hvac-api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:
  # workflow_dispatch allows you to trigger this manually from the GitHub Actions
  # tab in your repo — useful for the first deploy or redeploying without a code change.

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build, push, and deploy API

    steps:
      # Step 1: Check out the code
      - uses: actions/checkout@v4

      # Step 2: Log in to ACR so we can push the Docker image
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Step 3: Build the Docker image and push it to ACR.
      # We tag it with two tags:
      #   - :latest       → always points to the most recent build
      #   - :<git-sha>    → unique tag per commit, useful for rollbacks
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./hvac-api
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/hvac-api:latest
            ${{ secrets.ACR_LOGIN_SERVER }}/hvac-api:${{ github.sha }}

      # Step 4: Log in to Azure using the Service Principal credentials
      # AZURE_CREDENTIALS is a JSON object containing the Service Principal details.
      # We build it inline from the secrets we already have.
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      # Step 5: Tell the Container App to use the new image.
      # This creates a new revision in Azure Container Apps with the freshly pushed image.
      - name: Deploy new revision to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: ca-hvac-api-dev
          resourceGroup: rg-hvac-dev
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/hvac-api:${{ github.sha }}
          registryUrl: ${{ secrets.ACR_LOGIN_SERVER }}
          registryUsername: ${{ secrets.ACR_USERNAME }}
          registryPassword: ${{ secrets.ACR_PASSWORD }}
